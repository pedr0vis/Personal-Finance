<!DOCTYPE html>
<html lang='pt-br'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Personal Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <main>

        <h1>Personal Finance</h1>

        <form class="form-signin">

            <h2>Visualize seus gastos diários!</h2>

            <div>

                <label>Descreva o gasto. Ex: almoço, café, etc.
                    <input type="text" id="gasto" placeholder="Insira o gasto" required>
                </label>

            </div>

            <div>

                <label>Valor:
                    <input type="number" id="valor" placeholder="Insira o valor" required>
                </label>

            </div>

            <div>

                <label>Descreva a categoria. Ex: Alimentação, Transporte, etc.
                    <input type="text" id="categoria" placeholder="Insira a categoria">
                </label>

            </div>

            <button type="button" id="adicionar" onclick="salvarGasto()">Adicionar gasto</button>

        </form>

        <div class="container" id="gastos">

            <h2>Tabela com seus gastos:</h2>

            <table id="tabela">

                <tr>
                    <th>Gasto</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                </tr>

            </table>

            <p id="total">Total gasto:</p>

        </div>

    </main>

    <script src="main.js"></script>
</body>

<footer>

    <p>&copy; Todos os direitos reservados.</p>

            Henrique Oliveira Bezerra</a></p>

</footer>

</html>
